                        <div class="gk-myd-score-right">

    <script type="text/javascript">
    var mixin = {
        data: function () {
            return {
                list: [],
                mydShow: false, //满意度弹窗
                curSch: '',
                curMydData: {} //满意度弹窗数据
            }
        },
        methods: {
            showDetails: function (id, yxmc) {
                var _this = this;
                _this.curSch = yxmc;
                _this.curMydData = [];
                api.syncAjax('get', '/wap/sch/yxmydinfo/'+id).then(function (res) {
                    if (res.flag) {
                        var arr = [];
                        arr.push(res.msg.overall);
                        arr.push(res.msg.environ);
                        arr.push(res.msg.life);
                        for (let i = 0; i < arr.length; i++) {
                            var title = '';
                            if (arr[i].type=='0') {
                                title = '环境满意度'
                            }
                            if (arr[i].type=='1') {
                                title = '生活满意度'
                            }
                            if (arr[i].type=='2') {
                                title = '综合满意度'
                            }
                            _this.curMydData.push({
                                title: title,
                                rate: arr[i].avgRank,
                                rs: arr[i].totalCount,
                                detailRate: [
                                    Number(arr[i].star5AvgRank.replace('%', '')),
                                    Number(arr[i].star4AvgRank.replace('%', '')),
                                    Number(arr[i].star3AvgRank.replace('%', '')),
                                    Number(arr[i].star2AvgRank.replace('%', '')),
                                    Number(arr[i].star1AvgRank.replace('%', '')),
                                ]
                            })
                            _this.mydShow = true;
                        }
                    }
                })
            },
            getSchList: function () {
                var _this = this;
                var postdata = {
                    start: _this.startOfNextPage,
                    yxmc: _this.yxmc,
                    yxls: _this.yxls,
                    ssdm: _this.ssdm,
                    zgsx: _this.zgsxTem.length > 0 ? _this.zgsxTem[0] : '',
                    yxjbz: _this.yxjbzValue2,
                    bxlx: _this.bxlx,
                    xlcc: _this.xlcc
                }
                _this.loading = true;
                _this.finished = false;
                api.syncAjax('post', '/wap/sch/schsearch', {
                    data: postdata
                }).then(function (data) {
                    if (data.flag) {
                        _this.list = _.concat(_this.list, data.msg.list);
                        _this.loading = false;
                        _this.nextPageAvailable = data.msg.nextPageAvailable;
                        _this.startOfNextPage = data.msg.startOfNextPage;
                        if (!_this.nextPageAvailable) {
                            _this.finished = true;
                        } else {
                            _this.finished = false;
                        }
                    } else {
                        _this.loading = false;
                        _this.finished = true;
                        _this.$toast.fail(data.msg);
                    }
                });
            }
        },
        mounted: function () {
            this.queryCondition();
            this.getSchList();
        }
    };
</script>

                ],
                yxlsList: [
                    {text: "主管部门", value: ""}

                yxjbzList: [],

                tagsList: [],
                xlccList: [
                    {
                        text: '全部',
                        value: ''
                    },
                    {
                        text: '本科',
                        value: 'bk'
                    },
                    {
                        text: '高职(专科)',
                        value: 'gzzk'
                    },
                ]
            },
            mixins: typeof mixin != 'undefined' ? [mixin] : {},
            computed: {
                zgsxTem: function () {
                    var tem = [];
                    var _this = this;
                    this.zgsx.forEach(function (item) {
                        if (item != _this.yxjbzValue && item != _this.bxlxValue) {
                            tem.push(item);
                        }
                    });
                    return tem;
                },
                yxjbz: function () {
                    var tem = '';
                    var _this = this;
                    this.zgsx.forEach(function (item) {
                        if (item == _this.yxjbzValue) {
                            tem = _this.yxjbzValue;
                        }
                    });
                    return tem;
                },
                bxlx: function () {
                    var tem = '';
                    var _this = this;
                    this.zgsx.forEach(function (item) {
                        if (item == _this.bxlxValue) {
                            tem = _this.bxlxValue;
                        }
                    });
                    return tem;
                }
            },
            created: function () {
                this.addLoading();
            },
            mounted: function () {
                if (this.schId) {
                    this.getCategorylist();
                }
                if (typeof this.showLoading === 'undefined') {
                    this.removeLoading();
                }
            },
            methods: {
                setTagsList: function () {
                    var list = [];
                    if (this.xlcc !== '') {
                        list.push(_.find(this.xlccList, {
                            'value': this.xlcc
                        }).text)
                    }
                    if (this.zgsx.length !== 0) {
                        var temlist = [];
                        var _this = this;
                        _(this.zgsx).forEach(function (value) {
                            temlist.push(_.find(_this.zgsxList, {
                                'value': value
                            }).text)
                        });
                        list.push(temlist.join('、'))
                    }
                    if (this.yxjbzValue2 !== '') {
                        list.push(_.find(this.yxjbzList, {
                            'value': this.yxjbzValue2
                        }).text)
                    }
                    this.tagsList = list;
                },
                cancelChecked: function (value) {
                    if (this.yxjbzValue == value && this.yxjbzValue!='') {
                        this.yxjbzValue = '';
                        this.yxjbzValue2 = '';
                    } else {
                        this.yxjbzValue = value;
                    }
                },
                coverHeight: function (rate) {
                    var cHeight = '0%';
                    if (rate >= 4 && rate < 5) {
                        cHeight = '25%';
                    }
                    if (rate >= 3 && rate < 4) {
                        cHeight = '40%';
                    }
                    if (rate >= 2 && rate < 3) {
                        cHeight = '60%';
                    }
                    if (rate < 2) {
                        cHeight = '75%';
                    }
                    if (rate == 0) {
                        cHeight = '100%';
                    }
                    return cHeight;
                },
                tabFix: function () {
                    this.$nextTick(function () {
                        var nav = document.querySelector(".van-tabs__nav");
                        var window_offsetWidth = window.innerWidth; //屏幕宽度;
                        var dom = document.querySelector('.van-tab--active');
                        if (dom) {
                            var domoffsetWidth = dom.offsetLeft,
                            //中间值 =( 屏幕宽度 - li宽度 ) / 2;
                            diffWidth = (window_offsetWidth - dom.offsetWidth) / 2,
                            //目标值 = offset - 中间值
                            targetOffset = domoffsetWidth - diffWidth;

                            //正常
                            nav.scrollLeft = targetOffset;

                            // 未超出中间值
                            if (targetOffset < 0) {
                                nav.scrollLeft = 0;
                            }
                        }
                    });
                },
                queryCondition: function () { //查询条件列表渲染
                    var _this = this;
                    api.syncAjax('get', '/wap/sch/querycondition').then(function (data) {
                        if (data.flag) {
                            _this.ssdmList = data.msg.ssdmList;
                            _this.yxlsList = data.msg.yxlsList;
                            _this.zgsxList = data.msg.zgsxList;
                            _this.yxjbzList = data.msg.yxjbzList;
                            // 数组顶部插入空数据方便显示
                            _this.ssdmList.unshift({text: "所在地", value: ""});
                            _this.yxlsList[0].text = '主管部门';
                        }
                    });
                },
                onSearch: function () {
                    this.startOfNextPage = 0;
                    this.nextPageAvailable = false;
                    this.list = [];
                    this.getSchList();
                },
                onLoad: function () { // 加载更多
                    if (this.nextPageAvailable) {
                        this.getSchList();
                    }
                },
                onConfirm: function () {
                    this.setTagsList();
                    this.$refs.yxfilter.toggle();
                    this.onSearch();
                },
                clearQuery: function () {
                    this.xlcc = '';
                    this.yxjbzValue = '';
                    this.yxjbzValue2 = '';
                    this.zgsx = [];
                    this.allSelect = true;
                },
                clearTags: function () {
                    this.clearQuery();
                    this.onSearch();
                },
                getCategorylist: function () {
                    var _this = this;
                    api.syncAjax('get', '/wap/sch/categorylist/' + this.schId).then(function (data) {
                        if (data.flag) {
                            _this.schNavList = data.msg;
                            _this.$nextTick(function () {
                                _this.tabFix();
                            });
                        } else {
                            _this.$toast.fail(data.msg);
                        }
                    });
                },
                getUrl: function (fldName){
                    var url = 'javascript:;';
                    this.schNavList.forEach(function (item){
                        if (fldName === item.fldName) {
                            url = item.href;
                        }
                    });
                    return url;
                },
                goBack: function () {
                    if (this.navActiveName === 'index') {
                        location.href = '/wap/sch/schlist';
                    } else {
                        window.history.go(-1);
                    }
                },
                removeLoading: function () {
                    document.getElementById('loading-gif').style.display = 'none';
                    document.getElementsByTagName('body')[0].setAttribute('class','');
                },
                addLoading: function () {
                    document.getElementById('loading-gif').style.display = 'block';
                    document.getElementsByTagName('body')[0].setAttribute('class','van-overflow-hidden');
                },
                randomNum: function (yxdm) {
                    var num = Math.floor(yxdm.substring(4)/10*4+1);
                    return num;
                },
                selectYxtx: function(type, val) { //院校特性改为单选项
                    if (type == 'zgsx') {
                        this.allSelect = false;
                        this.zgsx = [];
                        this.yxjbzValue2 = '';
                        this.zgsx.push(val);
                    } else if (type == 'yxjbz') {
                        this.allSelect = false;
                        this.zgsx = [];
                        this.yxjbzValue2 = val;
                    } else {
                        this.allSelect = true;
                        this.zgsx = [];
                        this.yxjbzValue2 = '';
                    }
                },
                resetBtn: function() {
                    this.clearQuery();
                    this.onConfirm();
                }
            }
        });
    </script>
</body>
</html>
